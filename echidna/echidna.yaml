testMode: property

# Longer sequences give the fuzzer enough steps to (a) reach block 305+
# where staking passes MustStake2Rounds, and (b) walk through multiple
# commit → reveal → claim cycles.
seqLen: 200

# Start small; can be increased once it’s stable in CI.
testLimit: 25000

# Shrinking a counterexample can be *much* slower than fuzzing.
# Keep this modest; increase locally if you want a smaller reproducer.
shrinkLimit: 1000

# Bound random block jumps between transactions.
# 38 = ROUND_LENGTH/4 (one phase width) so the fuzzer naturally walks through
# commit → reveal → claim within the same redistribution round.
maxTimeDelay: 0
maxBlockDelay: 38

# Persist interesting inputs between runs.
corpusDir: echidna/corpus

# Useful while iterating on invariants.
coverage: true

# Keep output readable in CI.
format: text
