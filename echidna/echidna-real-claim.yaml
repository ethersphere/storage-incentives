testMode: property

# This harness uses fixed CAC/SOC proof fixtures, so it doesn't need the
# longer multi-round exploration budget used by the more general harnesses.
seqLen: 120

# Keep parity with the default config unless we find a reason to tune further.
testLimit: 25000
shrinkLimit: 1000

# 38 = ROUND_LENGTH / 4. This still lets Echidna walk commit -> reveal -> claim
# within the same redistribution round.
maxTimeDelay: 0
maxBlockDelay: 38

# Keep this harness isolated from the shared corpus used by other harnesses.
corpusDir: echidna/corpus-real-claim

coverage: true
format: text
