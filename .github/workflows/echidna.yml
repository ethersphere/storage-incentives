name: Echidna Fuzzing

on:
  pull_request:
    branches:
      - '**'
  schedule:
    # Nightly run (03:00 UTC).
    - cron: '0 3 * * *'
  workflow_dispatch: {}

env:
  NODEJS_VERSION: '20'
  ECHIDNA_IMAGE: ghcr.io/crytic/echidna/echidna:latest

jobs:
  echidna-fast:
    name: Echidna (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODEJS_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Echidna (fast config)
        env:
          ECHIDNA_CONFIG: echidna/echidna.ci.fast.yaml
        run: yarn echidna

      - name: Upload reproducers (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: echidna-fast-reproducers
          path: |
            echidna/corpus/reproducers*
            echidna/coverage
            crytic-export

  echidna-nightly:
    name: Echidna (nightly, seeded)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        seed: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODEJS_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Echidna (nightly config, seed ${{ matrix.seed }})
        env:
          ECHIDNA_CONFIG: echidna/echidna.ci.nightly.yaml
          ECHIDNA_ARGS: --seed ${{ matrix.seed }}
        run: yarn echidna

      - name: Upload reproducers (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: echidna-nightly-reproducers-seed-${{ matrix.seed }}
          path: |
            echidna/corpus/reproducers*
            echidna/coverage
            crytic-export

